services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: novel_translate
      POSTGRES_USER: novel
      POSTGRES_PASSWORD: novel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: novel
      MINIO_ROOT_PASSWORD: novel_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build: ./backend
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "novel_translate.api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000"
      ]
    depends_on:
      - postgres
      - redis
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"

  worker:
    build: ./backend
    command: ["uv", "run", "arq", "novel_translate.worker.main.WorkerSettings"]
    depends_on:
      - postgres
      - redis
    env_file:
      - path: .env
        required: false

volumes:
  postgres_data:
  redis_data:
  minio_data:
